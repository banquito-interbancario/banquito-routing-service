services:
  mongo-routing:
    image: mongo:7
    container_name: banquito-mongo-routing
    ports:
      - "27018:27017"
    volumes:
      - mongo_routing_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - routing-internal
      - alan-network

  routing-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: banquito-routing-service:local
    container_name: banquito-routing-service
    depends_on:
      mongo-routing:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      SPRING_APPLICATION_NAME: routing-service
      SPRING_DATA_MONGODB_URI: mongodb://mongo-routing:27017/routingdb
      SPRING_MONGODB_URI: mongodb://mongo-routing:27017/routingdb
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: payment.lines.queue
      RABBITMQ_CLEARING_QUEUE: clearing.outbound.queue
      ACCOUNT_CORE_REST_URL: http://account-core-service:8081
      ACCOUNT_CORE_GRPC_HOST: account-core-service
      ACCOUNT_CORE_GRPC_PORT: "9090"
      TARIFF_SERVICE_GRPC_HOST: tariff-service
      TARIFF_SERVICE_GRPC_PORT: "9091"
      NOTIFICATION_SERVICE_GRPC_HOST: notification-service
      NOTIFICATION_SERVICE_GRPC_PORT: "9092"
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - routing-internal
      - alan-network

networks:
  routing-internal:
    driver: bridge
  alan-network:
    external: true
    name: banquito-file-reception-service_default

volumes:
  mongo_routing_data:
