# Server
server.port=${SERVER_PORT:8085}
spring.application.name=${SPRING_APPLICATION_NAME:routing-service}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/routingdb}
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27018/routingdb}
spring.data.mongodb.auto-index-creation=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=20

# App queues
app.rabbitmq.payment-lines-queue=${RABBITMQ_QUEUE:payment.lines.queue}
app.rabbitmq.clearing-queue=${RABBITMQ_CLEARING_QUEUE:clearing.outbound.queue}

# REST - Oscar (account-core-service)
account.core.rest.url=${ACCOUNT_CORE_REST_URL:http://account-core-service:8081}

# gRPC clients (tariff y notification siguen siendo gRPC)
grpc.client.account-core.address=static://${ACCOUNT_CORE_GRPC_HOST:localhost}:${ACCOUNT_CORE_GRPC_PORT:9090}
grpc.client.account-core.negotiation-type=plaintext
grpc.client.tariff.address=static://${TARIFF_SERVICE_GRPC_HOST:localhost}:${TARIFF_SERVICE_GRPC_PORT:9091}
grpc.client.tariff.negotiation-type=plaintext
grpc.client.notification.address=static://${NOTIFICATION_SERVICE_GRPC_HOST:localhost}:${NOTIFICATION_SERVICE_GRPC_PORT:9092}
grpc.client.notification.negotiation-type=plaintext

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=false
management.health.readinessstate.enabled=false
