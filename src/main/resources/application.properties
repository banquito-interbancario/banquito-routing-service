# Server
server.port=${SERVER_PORT:8085}
spring.application.name=${SPRING_APPLICATION_NAME:routing-service}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/banquito}
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27018/banquito}
spring.data.mongodb.auto-index-creation=true

# Kafka (Confluent Cloud - SASL_SSL)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:org.apache.kafka.common.security.plain.PlainLoginModule required username="" password="";}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:routing-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# App topics
app.kafka.payment-lines-topic=${KAFKA_PAYMENT_LINES_TOPIC:payment-lines}
app.kafka.clearing-topic=${KAFKA_CLEARING_TOPIC:clearing-outbound}
app.kafka.consumer-concurrency=${KAFKA_CONSUMER_CONCURRENCY:5}
app.routing.local-completion-enabled=${ROUTING_LOCAL_COMPLETION_ENABLED:false}
routing.grpc.port=${ROUTING_GRPC_PORT:9094}

# REST - Oscar (account-core-service via Kong)
account.core.rest.url=${CORE_GATEWAY_URL:http://account-core-service:8081}
account.core.corporate.account-number=${CORPORATE_ACCOUNT_NUMBER:0000000000}

# gRPC clients (tariff y notification siguen siendo gRPC)
grpc.client.account-core.address=static://${ACCOUNT_CORE_GRPC_HOST:localhost}:${ACCOUNT_CORE_GRPC_PORT:9090}
grpc.client.account-core.negotiation-type=plaintext
grpc.client.tariff.address=static://${TARIFF_SERVICE_GRPC_HOST:localhost}:${TARIFF_SERVICE_GRPC_PORT:9090}
grpc.client.tariff.negotiation-type=plaintext
grpc.client.notification.address=static://${NOTIFICATION_SERVICE_GRPC_HOST:localhost}:${NOTIFICATION_SERVICE_GRPC_PORT:9092}
grpc.client.notification.negotiation-type=plaintext

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=false
management.health.readinessstate.enabled=false
