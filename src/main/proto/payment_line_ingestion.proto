syntax = "proto3";

package switch.batch.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "ec.edu.espe.banquito.routingservice.grpc";

service PaymentLineIngestionService {
  rpc PublishBatchLines(PublishBatchLinesRequest) returns (PublishBatchLinesResponse);
}

message PublishBatchLinesRequest {
  string batch_id = 1;
  google.protobuf.Timestamp scheduled_process_at = 2;
  repeated BatchLine lines = 3;
}

message BatchLine {
  string batch_id = 1;
  int32 line_number = 2;
  string routing_code = 3;
  string account_destination = 4;
  string amount = 5;
  string reference = 6;
  string beneficiary_name = 7;
  string beneficiary_email = 8;
}

message PublishBatchLinesResponse {
  bool accepted = 1;
  string message = 2;
}
